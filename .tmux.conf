set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Renumber windows
bind R move-window -r \; display-message "Windows renumbered"

bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind H resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'


# Automatic renumbering / start index at 1
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Tokyo Dark color scheme - Official Palette
# Source: https://github.com/tiagovla/tokyodark.nvim/blob/master/lua/tokyodark/palette.lua

# Base colors
deep_night="#11121D"  # bg0
lavender="#A0A8CD"    # fg
charcoal="#212234"    # bg2
gray="#4A5057"        # bg4/grey

# Terminal colors
black="#06080A"
red="#EE6D85"
green="#95C561"
yellow="#D7A65F"
blue="#7199EE"
magenta="#A485DD"     # purple
cyan="#38A89D"
white="#A0A8CD"       # fg
orange="#F6955B"

# Apply theme
set -g status-position "top"
set -g status-style "bg=default,fg=$lavender"
set -g status-left "#[fg=$lavender,bold]#S | "
set -g status-left-length 100
set -g status-right "%I:%M %p"
set -g pane-border-style "fg=$charcoal"
set -g pane-active-border-style "fg=$gray"
set -g window-status-format " #I:#W"
set -g window-status-current-format "#[fg=$cyan,bold] #I:#W"
set -g message-style "bg=default,fg=$lavender"
set -g mode-style "bg=default,fg=$lavender"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
